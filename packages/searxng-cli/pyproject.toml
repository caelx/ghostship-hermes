[build-system]
requires = ["hatchling>=1.29.0"]
build-backend = "hatchling.build"

[project]
name = "ghostship-searxng"
version = "0.1.0"
description = "SearXNG CLI wrapper for ghostship-hermes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "ghostship-cli-contract>=0.1.0",
  "httpx>=0.28.1",
  "typer>=0.24.1",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "pytest>=8.4.2",
]

[project.scripts]
ghostship-searxng = "ghostship_searxng.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/ghostship_searxng"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
markers = [
  "integration: exercises a configured SearXNG deployment",
]
