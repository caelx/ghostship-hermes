[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "ghostship-plex"
version = "0.1.0"
description = "Plex CLI wrapper for ghostship-hermes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "typer>=0.16.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "pytest>=8.4.2",
]

[project.scripts]
ghostship-plex = "ghostship_plex.cli:main"

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
markers = [
  "integration: exercises a configured Plex deployment",
]
