<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ghostship-hermes</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body data-dashboard="ghostship-hermes-dashboard">
    <main class="shell">
      <section class="panel">
        <p class="eyebrow">ghostship-hermes</p>
        <h1>Hermes terminal</h1>
        <p class="lede">
          Minimal dashboard for the upstream-aligned Hermes runtime. Launch a temporary
          browser terminal when you need one, then shut it down.
        </p>
        <div class="controls">
          <button id="open-terminal" type="button">Open Terminal</button>
          <button id="close-terminal" type="button" class="secondary">Close Terminal</button>
        </div>
        <dl class="status-grid">
          <div>
            <dt>Status</dt>
            <dd id="terminal-status">Checking</dd>
          </div>
          <div>
            <dt>Workspace</dt>
            <dd id="terminal-workspace">/workspace</dd>
          </div>
          <div>
            <dt>Route</dt>
            <dd id="terminal-route">/terminal</dd>
          </div>
        </dl>
      </section>
      <section class="terminal-panel">
        <iframe
          id="terminal-frame"
          title="ghostship-hermes terminal"
          loading="lazy"
          referrerpolicy="same-origin"
        ></iframe>
      </section>
    </main>
    <script src="/app.js" defer></script>
  </body>
</html>
