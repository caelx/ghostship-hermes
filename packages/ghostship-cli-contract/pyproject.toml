[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "ghostship-cli-contract"
version = "0.1.0"
description = "Shared CLI contract helpers for ghostship-hermes utilities"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "typer>=0.16.0",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "pytest>=8.4.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/ghostship_cli_contract"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
