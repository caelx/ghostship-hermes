[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "hermes-dashboard"
version = "0.2.0"
description = "HUDUI-aligned FastAPI dashboard for ghostship-hermes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.115.0",
  "uvicorn[standard]>=0.34.0",
  "watchfiles>=0.24.0",
  "pyyaml>=6.0",
  "websockets>=12.0",
  "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
  "pytest>=8.4.2",
]

[project.scripts]
hermes-dashboard = "hermes_dashboard.app:cli"

[tool.hatch.build]
include = [
  "src/hermes_dashboard/static/**",
]

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_dashboard"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
