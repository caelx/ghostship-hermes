[build-system]
requires = ["hatchling>=1.27.0"]
build-backend = "hatchling.build"

[project]
name = "hermes-dashboard"
version = "0.1.0"
description = "FastAPI dashboard for ghostship-hermes"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
  "fastapi>=0.111.0",
  "uvicorn>=0.30.1",
  "websockets>=12.0",
  "httpx>=0.28.1",
]

[project.optional-dependencies]
dev = [
  "mypy>=1.18.2",
  "pytest>=8.4.2",
]

[project.scripts]
hermes-dashboard = "hermes_dashboard.app:main"

[tool.hatch.build.targets.wheel]
packages = ["src/hermes_dashboard"]

[tool.pytest.ini_options]
addopts = "-ra"
testpaths = ["tests"]
