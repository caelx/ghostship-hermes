<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ghostship-hermes</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body class="glass-ui" data-dashboard="ghostship-hermes-dashboard" data-dashboard-style="glass">
  <div class="shell">
    <aside class="rail" aria-label="Sessions rail">
      <div class="rail-top">
        <button id="open-terminal" class="rail-action" type="button" title="New unit" aria-label="New unit">
          <span class="rail-action-plus">+</span>
        </button>
      </div>
      <div class="rail-divider" aria-hidden="true"></div>
      <nav id="terminal-tabs" class="rail-tabs" aria-label="Terminal sessions"></nav>
    </aside>

    <main class="stage">
      <div class="stage-atmosphere" aria-hidden="true">
        <div class="orb orb-a"></div>
        <div class="orb orb-b"></div>
        <div class="orb orb-c"></div>
        <div class="grid-glow"></div>
        <div class="grain"></div>
      </div>

      <section id="blank-home" class="home-view">
        <div class="home-panel glass-panel">
          <p class="eyebrow">ghostship-hermes / dashboard</p>
          <h1 class="home-title">Clear glass. Live shell.</h1>
          <p class="home-copy">
            Open a unit to launch an ephemeral ttyd session rooted at <code>/home/hermes</code>.
            The dashboard stays out of the way; the terminal owns scrolling, fit, and interaction.
          </p>
          <div class="profile-strip" aria-label="Managed profiles">
            <span class="profile-chip">operations</span>
            <span class="profile-chip">coder</span>
          </div>
        </div>
      </section>

      <section id="terminal-stage" class="terminal-stage is-hidden">
        <button id="close-terminal" class="floating-close is-hidden" type="button" aria-label="Close active session" title="Close active session">
          <span aria-hidden="true">×</span>
        </button>

        <div id="terminal-loading" class="terminal-loading is-hidden" aria-live="polite">
          <div class="loading-ring"></div>
          <div class="loading-copy">Opening unit</div>
        </div>

        <div id="terminal-panes" class="terminal-panes"></div>
      </section>
    </main>
  </div>
  <script src="/app.js" defer></script>
</body>
</html>
