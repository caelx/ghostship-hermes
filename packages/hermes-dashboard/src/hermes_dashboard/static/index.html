<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hermes Dashboard</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=IBM+Plex+Mono&display=swap" rel="stylesheet">
</head>
<body class="mmx-ui" data-dashboard="ghostship-hermes-dashboard" data-dashboard-style="glass">
  <main class="dashboard-shell">
    <aside class="sidebar glass-pane">
      <header class="brand">
        <div class="logo-container">
          <img src="/logo.png" alt="logo" class="brand-logo">
        </div>
        <h1 class="brand-title">Hermes</h1>
      </header>

      <nav class="session-nav">
        <button id="open-terminal" class="btn-new" type="button" title="New Session">
          <span class="btn-icon">+</span>
          <span class="btn-text">New Session</span>
        </button>
        <div id="terminal-tabs" class="terminal-tabs">
          <!-- Populated by JS -->
        </div>
      </nav>
    </aside>

    <section class="stage">
      <div id="blank-home" class="blank-home">
        <div class="hero-container">
          <h2 class="hero-title">Ready.</h2>
          <div class="sub-text">Workstation Active</div>
        </div>
      </div>

      <div id="terminal-stage" class="terminal-stage glass-pane is-hidden">
        <header class="terminal-controls">
          <button id="close-terminal" class="btn-kill" type="button" disabled title="Close Session">
            <span class="btn-icon">✕</span>
            <span class="btn-text">Close</span>
          </button>
        </header>

        <div id="terminal-loading" class="terminal-loading is-hidden">
          <div class="mmx-loader">
            <div class="loader-bar"></div>
          </div>
          <div class="loader-text">Connecting...</div>
        </div>

        <div id="terminal-panes" class="terminal-panes">
          <!-- Iframes injected here -->
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
