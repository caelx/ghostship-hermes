<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ghostship-hermes // terminal</title>
  <link rel="stylesheet" href="/styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,600;1,400&family=Share+Tech+Mono&display=swap" rel="stylesheet">
</head>
<body class="mmx-ui">
  <main class="dashboard-shell">
    <aside class="sidebar">
      <header class="brand">
        <div class="logo-container">
          <img src="/logo.png" alt="logo" class="brand-logo">
        </div>
        <h1 class="brand-title">HERMES_OS</h1>
      </header>

      <nav class="session-nav">
        <button id="open-terminal" class="btn-new" type="button" title="[ STAGE_SELECT ]">
          <span class="btn-icon">+</span>
          <span class="btn-text">NEW_UNIT</span>
        </button>
        <div id="terminal-tabs" class="terminal-tabs">
          <!-- Populated by JS -->
        </div>
      </nav>
    </aside>

    <section class="stage">
      <div id="blank-home" class="blank-home">
        <div class="hero-container">
          <h2 class="hero-title">READY</h2>
          <div class="sub-text">GHOSTSHIP_HERMES</div>
        </div>
      </div>

      <div id="terminal-stage" class="terminal-stage is-hidden">
        <header class="terminal-controls">
          <button id="close-terminal" class="btn-kill" type="button" disabled title="[ ABORT_MISSION ]">
            <span class="btn-icon">✕</span>
            <span class="btn-text">TERMINATE_SESSION</span>
          </button>
        </header>

        <div id="terminal-loading" class="terminal-loading is-hidden">
          <div class="mmx-loader">
            <div class="loader-bar"></div>
          </div>
          <div class="loader-text">INITIALIZING_BATTLE_STATION...</div>
        </div>

        <div id="terminal-panes" class="terminal-panes">
          <!-- Iframes injected here -->
        </div>
      </div>
    </section>
  </main>
  <script src="/app.js" defer></script>
</body>
</html>
