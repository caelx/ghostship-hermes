name: update-hermes-release

on:
  workflow_dispatch:
  schedule:
    - cron: "13 * * * *"

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      actions: write
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Refresh pinned Hermes release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/update_hermes_release.py

      - name: Refresh Hermes flake lock
        run: nix flake lock --update-input hermes-agent

      - name: Detect release changes
        id: changes
        run: |
          if git diff --quiet -- packages/hermes-image/hermes-release.txt flake.nix flake.lock CHANGELOG.md; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push if changed
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add packages/hermes-image/hermes-release.txt flake.nix flake.lock CHANGELOG.md
          git commit -m "chore(hermes): update pinned release"
          git push

      - name: Dispatch image publish
        if: steps.changes.outputs.changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          curl --fail-with-body \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/$GITHUB_REPOSITORY/actions/workflows/publish-image.yml/dispatches" \
            -d '{"ref":"main"}'
