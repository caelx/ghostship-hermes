name: update-hermes-release

on:
  workflow_dispatch:
  schedule:
    - cron: "13 * * * *"

jobs:
  update:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Refresh pinned Hermes release
        run: python3 scripts/update_hermes_release.py

      - name: Commit and push if changed
        run: |
          if git diff --quiet -- packages/hermes-image/hermes-release.txt; then
            exit 0
          fi
          git config user.name github-actions
          git config user.email github-actions@users.noreply.github.com
          git add packages/hermes-image/hermes-release.txt CHANGELOG.md
          git commit -m "chore(hermes): update pinned release"
          git push
