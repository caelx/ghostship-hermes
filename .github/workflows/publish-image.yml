name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.system == 'aarch64-linux'
        uses: docker/setup-qemu-action@v3

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux

      - name: Build image tarball
        run: |
          nix build .#packages.${{ matrix.system }}.ghostship-hermes-image
          # Normalize name for upload
          ARCH=$(echo ${{ matrix.system }} | cut -d'-' -f1)
          cp "$(readlink -f result)" "ghostship-hermes-${ARCH}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostship-hermes-${{ matrix.system }}
          path: ghostship-hermes-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Install Nix tooling
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Publish image tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ghostship-hermes
          GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          set -euo pipefail

          HERMES_REF="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          tags=("sha-$GIT_SHA")

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags=(latest "sha-$GIT_SHA" "hermes-$HERMES_REF")
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          publish_arch() {
            arch="$1"
            tarball="$2"
            case "$arch" in
              amd64)
                platform_tag="amd64"
                ;;
              arm64)
                platform_tag="arm64"
                ;;
              *)
                echo "unexpected arch: $arch" >&2
                exit 64
                ;;
            esac

            for tag in "${tags[@]}"; do
              nix shell nixpkgs#skopeo -c skopeo copy \
                "docker-archive:$tarball" \
                "docker://$IMAGE_NAME:$tag-$platform_tag"
            done
          }

          publish_arch amd64 "$(readlink -f dist/ghostship-hermes-x86_64-linux/ghostship-hermes-x86_64.tar.gz)"
          publish_arch arm64 "$(readlink -f dist/ghostship-hermes-aarch64-linux/ghostship-hermes-aarch64.tar.gz)"

          for tag in "${tags[@]}"; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
