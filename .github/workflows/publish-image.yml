name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-image.yml'
      - '.github/workflows/update-hermes-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'packages/**'
      - 'scripts/export_publishable_image.sh'

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    outputs:
      hermes_ref: ${{ steps.meta.outputs.hermes_ref }}
      image_name: ${{ steps.meta.outputs.image_name }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          hermes_ref="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes"
          tags="sha-${GITHUB_SHA}"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest sha-${GITHUB_SHA} hermes-${hermes_ref}"
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          {
            echo "hermes_ref=${hermes_ref}"
            echo "image_name=${image_name}"
            echo "tags=${tags}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runs_on: ubuntu-24.04
            platform_tag: amd64
          - system: aarch64-linux
            runs_on: ubuntu-24.04-arm
            platform_tag: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
      PLATFORM_TAG: ${{ matrix.platform_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable GitHub Actions Nix cache
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build publishable image archive
        shell: bash
        run: |
          set -euo pipefail

          # Full image publication builds execute target-system derivations, so
          # each leg must run on infrastructure that can build that system.
          nix build .#packages.${{ matrix.system }}.ghostship-hermes-image
          scripts/export_publishable_image.sh "$(readlink -f result)" "ghostship-hermes:ci-${PLATFORM_TAG}" "ghostship-hermes-${PLATFORM_TAG}.tar"

      - name: Publish architecture image tags
        shell: bash
        run: |
          set -euo pipefail

          tar_path="$(pwd)/ghostship-hermes-${PLATFORM_TAG}.tar"
          cat > publish-arch-tags.sh <<'SCRIPT'
          set -euo pipefail
          for tag in $TAGS; do
            skopeo copy \
              "docker-archive:${TAR_PATH}" \
              "docker://${IMAGE_NAME}:${tag}-${PLATFORM_TAG}"
          done
          SCRIPT
          chmod +x publish-arch-tags.sh
          export TAR_PATH="$tar_path"
          nix shell nixpkgs#skopeo -c bash ./publish-arch-tags.sh

      - name: Remove temporary publish script
        if: always()
        run: rm -f publish-arch-tags.sh

  publish-manifests:
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish manifest lists
        shell: bash
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
