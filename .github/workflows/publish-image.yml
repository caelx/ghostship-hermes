name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        system: [x86_64-linux, aarch64-linux]
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up QEMU
        if: matrix.system == 'aarch64-linux'
        uses: docker/setup-qemu-action@v3

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            extra-platforms = aarch64-linux

      - name: Build image tarball
        run: |
          nix build .#packages.${{ matrix.system }}.ghostship-hermes-image
          # Normalize name for upload
          ARCH=$(echo ${{ matrix.system }} | cut -d'-' -f1)
          cp "$(readlink -f result)" "ghostship-hermes-${ARCH}.tar.gz"

      - name: Upload image artifact
        uses: actions/upload-artifact@v7
        with:
          name: ghostship-hermes-${{ matrix.system }}
          path: ghostship-hermes-*.tar.gz

  publish:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Install skopeo
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ghostship-hermes
          GIT_SHA: ${{ github.sha }}
        run: |
          # Fetch versions
          HERMES_REF="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          
          # Publish x86_64
          AMD64_PATH="$(readlink -f dist/ghostship-hermes-x86_64-linux/ghostship-hermes-x86_64.tar.gz)"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$AMD64_PATH" "docker://$IMAGE_NAME:sha-$GIT_SHA-amd64"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$AMD64_PATH" "docker://$IMAGE_NAME:latest-amd64"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$AMD64_PATH" "docker://$IMAGE_NAME:hermes-$HERMES_REF-amd64"

          # Publish aarch64
          ARM64_PATH="$(readlink -f dist/ghostship-hermes-aarch64-linux/ghostship-hermes-aarch64.tar.gz)"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$ARM64_PATH" "docker://$IMAGE_NAME:sha-$GIT_SHA-arm64"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$ARM64_PATH" "docker://$IMAGE_NAME:latest-arm64"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$ARM64_PATH" "docker://$IMAGE_NAME:hermes-$HERMES_REF-arm64"

          # Create multi-arch manifests (latest, sha, release)
          # We use skopeo to create the manifest lists
          nix shell nixpkgs#skopeo -c skopeo copy --format v2s2 "docker://$IMAGE_NAME:sha-$GIT_SHA-amd64" "docker://$IMAGE_NAME:sha-$GIT_SHA" --additional-tag "docker://$IMAGE_NAME:sha-$GIT_SHA-arm64" || true
          
          # More reliable way to build manifest with skopeo or docker
          # Since we are already logged in to docker, we can use docker manifest
          docker manifest create "$IMAGE_NAME:latest" "$IMAGE_NAME:latest-amd64" "$IMAGE_NAME:latest-arm64"
          docker manifest push "$IMAGE_NAME:latest"
          
          docker manifest create "$IMAGE_NAME:sha-$GIT_SHA" "$IMAGE_NAME:sha-$GIT_SHA-amd64" "$IMAGE_NAME:sha-$GIT_SHA-arm64"
          docker manifest push "$IMAGE_NAME:sha-$GIT_SHA"
          
          docker manifest create "$IMAGE_NAME:hermes-$HERMES_REF" "$IMAGE_NAME:hermes-$HERMES_REF-amd64" "$IMAGE_NAME:hermes-$HERMES_REF-arm64"
          docker manifest push "$IMAGE_NAME:hermes-$HERMES_REF"
