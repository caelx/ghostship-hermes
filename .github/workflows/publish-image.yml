name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-image.yml'
      - '.github/workflows/update-hermes-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'packages/**'
      - 'scripts/export_publishable_image.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      tags: ${{ steps.meta.outputs.tags }}
      hermes_ref: ${{ steps.meta.outputs.hermes_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          hermes_ref="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes"
          tags="sha-${GITHUB_SHA}"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest sha-${GITHUB_SHA} hermes-${hermes_ref}"
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          {
            echo "image_name=${image_name}"
            echo "tags=${tags}"
            echo "hermes_ref=${hermes_ref}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runs_on: ubuntu-24.04
            platform_tag: amd64
          - system: aarch64-linux
            runs_on: ubuntu-24.04-arm
            platform_tag: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
      HERMES_REF: ${{ needs.prepare.outputs.hermes_ref }}
      PLATFORM_TAG: ${{ matrix.platform_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image references
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          final_drv="$(nix eval .#packages.${{ matrix.system }}.ghostship-hermes-image.drvPath --raw)"
          content_hash="$(echo "$final_drv" | sha256sum | cut -c1-24)"
          content_ref="${IMAGE_NAME}:content-${content_hash}-${PLATFORM_TAG}"

          {
            echo "final_drv=${final_drv}"
            echo "content_hash=${content_hash}"
            echo "content_ref=${content_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Build and publish content-addressed final image
        env:
          CONTENT_REF: ${{ steps.refs.outputs.content_ref }}
        shell: bash
        run: |
          set -euo pipefail

          final_bundle="$(nix build --no-link --print-out-paths .#packages.${{ matrix.system }}.ghostship-hermes-image)"

          scripts/export_publishable_image.sh \
            "$final_bundle" \
            "ghostship-hermes:ci-${PLATFORM_TAG}" \
            "ghostship-hermes-${PLATFORM_TAG}.tar"
          nix shell nixpkgs#skopeo -c skopeo copy \
            "docker-archive:$(pwd)/ghostship-hermes-${PLATFORM_TAG}.tar" \
            "docker://${CONTENT_REF}"

      - name: Publish architecture image tags
        env:
          CONTENT_REF: ${{ steps.refs.outputs.content_ref }}
        shell: bash
        run: |
          set -euo pipefail

          cat > publish-arch-tags.sh <<'SCRIPT'
          set -euo pipefail
          for tag in $TAGS; do
            skopeo copy \
              "docker://${CONTENT_REF}" \
              "docker://${IMAGE_NAME}:${tag}-${PLATFORM_TAG}"
          done
          SCRIPT
          chmod +x publish-arch-tags.sh
          nix shell nixpkgs#skopeo -c bash ./publish-arch-tags.sh

      - name: Remove temporary publish artifacts
        if: always()
        run: rm -rf publish-arch-tags.sh "ghostship-hermes-${PLATFORM_TAG}.tar"

  publish-manifests:
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish manifest lists
        shell: bash
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
