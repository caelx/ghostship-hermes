name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-image.yml'
      - '.github/workflows/update-hermes-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'packages/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      base_image_name: ${{ steps.meta.outputs.base_image_name }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          hermes_ref="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes"
          base_image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes-base"
          tags="sha-${GITHUB_SHA}"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest sha-${GITHUB_SHA} hermes-${hermes_ref}"
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          {
            echo "image_name=${image_name}"
            echo "base_image_name=${base_image_name}"
            echo "tags=${tags}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runs_on: ubuntu-24.04
            platform_tag: amd64
          - system: aarch64-linux
            runs_on: ubuntu-24.04-arm
            platform_tag: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      BASE_IMAGE_NAME: ${{ needs.prepare.outputs.base_image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
      PLATFORM_TAG: ${{ matrix.platform_tag }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve image references
        id: refs
        shell: bash
        run: |
          set -euo pipefail

          base_drv="$(nix eval .#packages.${{ matrix.system }}.ghostship-hermes-base-image.drvPath --raw)"
          overlay_drv="$(nix eval .#packages.${{ matrix.system }}.ghostship-hermes-overlay-bundle.drvPath --raw)"
          base_tag="base-$(basename "$base_drv" .drv)"
          content_hash="$(printf '%s\n%s\n' "$base_drv" "$overlay_drv" | sha256sum | cut -c1-24)"
          base_ref="${BASE_IMAGE_NAME}:${base_tag}-${PLATFORM_TAG}"
          content_ref="${IMAGE_NAME}:content-${content_hash}-${PLATFORM_TAG}"

          {
            echo "base_drv=${base_drv}"
            echo "overlay_drv=${overlay_drv}"
            echo "content_hash=${content_hash}"
            echo "base_ref=${base_ref}"
            echo "content_ref=${content_ref}"
          } >> "$GITHUB_OUTPUT"

      - name: Check for reusable final image
        id: reusable
        env:
          CONTENT_REF: ${{ steps.refs.outputs.content_ref }}
        shell: bash
        run: |
          set -euo pipefail

          if nix shell nixpkgs#skopeo -c skopeo inspect "docker://${CONTENT_REF}" >/dev/null 2>&1; then
            echo "reusing published final image ${CONTENT_REF}"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "no reusable final image found for ${CONTENT_REF}"
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure base image tag exists
        if: steps.reusable.outputs.exists != 'true'
        env:
          BASE_REF: ${{ steps.refs.outputs.base_ref }}
        shell: bash
        run: |
          set -euo pipefail

          if nix shell nixpkgs#skopeo -c skopeo inspect "docker://${BASE_REF}" >/dev/null 2>&1; then
            echo "reusing published base image ${BASE_REF}"
            exit 0
          fi

          echo "publishing new base image ${BASE_REF}"
          base_bundle="$(nix build --no-link --print-out-paths .#packages.${{ matrix.system }}.ghostship-hermes-base-image)"
          scripts/export_publishable_image.sh "$base_bundle" "ghostship-hermes-base:ci-${PLATFORM_TAG}" "ghostship-hermes-base-${PLATFORM_TAG}.tar"
          nix shell nixpkgs#skopeo -c skopeo copy \
            "docker-archive:$(pwd)/ghostship-hermes-base-${PLATFORM_TAG}.tar" \
            "docker://${BASE_REF}"

      - name: Build and publish content-addressed final image
        if: steps.reusable.outputs.exists != 'true'
        env:
          BASE_REF: ${{ steps.refs.outputs.base_ref }}
          CONTENT_REF: ${{ steps.refs.outputs.content_ref }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            if docker pull "${BASE_REF}"; then
              break
            fi
            if [ "$attempt" -eq 5 ]; then
              echo "failed to pull base image ${BASE_REF} after ${attempt} attempts" >&2
              exit 1
            fi
            sleep "$((attempt * 5))"
          done

          local_base_image="ghostship-hermes-base:build-${PLATFORM_TAG}"
          docker tag "${BASE_REF}" "${local_base_image}"

          overlay_bundle="$(nix build --no-link --print-out-paths .#packages.${{ matrix.system }}.ghostship-hermes-overlay-bundle)"
          docker build \
            --build-arg "BASE_IMAGE=${local_base_image}" \
            --tag "ghostship-hermes:ci-${PLATFORM_TAG}" \
            "$overlay_bundle"
          nix shell nixpkgs#skopeo -c skopeo copy \
            "docker-daemon:ghostship-hermes:ci-${PLATFORM_TAG}" \
            "docker://${CONTENT_REF}"

      - name: Publish architecture image tags
        env:
          CONTENT_REF: ${{ steps.refs.outputs.content_ref }}
        shell: bash
        run: |
          set -euo pipefail

          cat > publish-arch-tags.sh <<'SCRIPT'
          set -euo pipefail
          for tag in $TAGS; do
            skopeo copy \
              "docker://${CONTENT_REF}" \
              "docker://${IMAGE_NAME}:${tag}-${PLATFORM_TAG}"
          done
          SCRIPT
          chmod +x publish-arch-tags.sh
          nix shell nixpkgs#skopeo -c bash ./publish-arch-tags.sh

      - name: Remove temporary publish script
        if: always()
        run: rm -f publish-arch-tags.sh "ghostship-hermes-base-${PLATFORM_TAG}.tar"

  publish-manifests:
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish manifest lists
        shell: bash
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
