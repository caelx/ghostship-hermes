name: publish-image

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-arm64:
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Build arm64 image tarball
        run: |
          nix build .#packages.aarch64-linux.ghostship-hermes-image
          cp "$(readlink -f result)" ghostship-hermes-arm64.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ghostship-hermes-arm64
          path: ghostship-hermes-arm64.tar.gz

  publish-arm64:
    needs: build-arm64
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ghostship-hermes-arm64
          path: dist

      - name: Install skopeo
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish image tags
        env:
          IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/ghostship-hermes
          GIT_SHA: ${{ github.sha }}
        run: |
          IMAGE_PATH="$(readlink -f dist/ghostship-hermes-arm64.tar.gz)"
          HERMES_REF="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$IMAGE_PATH" "docker://$IMAGE_NAME:sha-$GIT_SHA"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$IMAGE_PATH" "docker://$IMAGE_NAME:latest"
          nix shell nixpkgs#skopeo -c skopeo copy "docker-archive:$IMAGE_PATH" "docker://$IMAGE_NAME:hermes-$HERMES_REF"
