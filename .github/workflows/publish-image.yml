name: publish-image

on:
  workflow_dispatch:
  schedule:
    - cron: '0 14 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-image.yml'
      - '.github/workflows/update-hermes-release.yml'
      - 'packages/**'
      - 'tests/hermes-image/**'
      - 'README.md'
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      tags: ${{ steps.meta.outputs.tags }}
      hermes_ref: ${{ steps.meta.outputs.hermes_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          hermes_ref="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes"
          tags="sha-${GITHUB_SHA}"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest sha-${GITHUB_SHA} hermes-${hermes_ref}"
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          {
            echo "image_name=${image_name}"
            echo "tags=${tags}"
            echo "hermes_ref=${hermes_ref}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runs_on: ubuntu-24.04
            platform_tag: amd64
          - platform: linux/arm64
            runs_on: ubuntu-24.04-arm
            platform_tag: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
      HERMES_REF: ${{ needs.prepare.outputs.hermes_ref }}
      PLATFORM_TAG: ${{ matrix.platform_tag }}
      PLATFORM: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v6

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push architecture image
        shell: bash
        run: |
          set -euo pipefail

          tag_args=()
          for tag in $TAGS; do
            tag_args+=(--tag "${IMAGE_NAME}:${tag}-${PLATFORM_TAG}")
          done

          docker buildx build \
            --platform "${PLATFORM}" \
            --push \
            --build-arg "HERMES_REF=${HERMES_REF}" \
            "${tag_args[@]}" \
            --file packages/hermes-image/Dockerfile \
            .

  publish-manifests:
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish manifest lists
        shell: bash
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
