name: publish-image

on:
  workflow_dispatch:
    inputs:
      publish_shared_cache:
        description: Publish or refresh the shared Nix cache after the image build
        required: false
        default: false
        type: boolean
  schedule:
    - cron: '0 14 * * *'
  push:
    branches:
      - main
    paths:
      - '.github/workflows/publish-image.yml'
      - '.github/workflows/update-hermes-release.yml'
      - 'flake.nix'
      - 'flake.lock'
      - 'packages/**'
      - 'scripts/export_publishable_image.sh'
      - 'scripts/shared_nix_cache.sh'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  prepare:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      image_name: ${{ steps.meta.outputs.image_name }}
      tags: ${{ steps.meta.outputs.tags }}
      hermes_ref: ${{ steps.meta.outputs.hermes_ref }}
    steps:
      - uses: actions/checkout@v6

      - name: Compute publish metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          hermes_ref="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)"
          image_name="ghcr.io/${GITHUB_REPOSITORY_OWNER}/ghostship-hermes"
          tags="sha-${GITHUB_SHA}"

          if [ "$GITHUB_REF" = "refs/heads/main" ]; then
            tags="latest sha-${GITHUB_SHA} hermes-${hermes_ref}"
          else
            echo "non-main workflow_dispatch detected for $GITHUB_REF; publishing immutable sha tag only"
          fi

          {
            echo "image_name=${image_name}"
            echo "tags=${tags}"
            echo "hermes_ref=${hermes_ref}"
          } >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: prepare
    strategy:
      matrix:
        include:
          - system: x86_64-linux
            runs_on: ubuntu-24.04
            platform_tag: amd64
          - system: aarch64-linux
            runs_on: ubuntu-24.04-arm
            platform_tag: arm64
    runs-on: ${{ matrix.runs_on }}
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
      HERMES_REF: ${{ needs.prepare.outputs.hermes_ref }}
      PLATFORM_TAG: ${{ matrix.platform_tag }}
      GHOSTSHIP_CACHE_REPO: ${{ vars.GHOSTSHIP_CACHE_REPO }}
      GHOSTSHIP_CACHE_PUBLIC_KEY: ${{ vars.GHOSTSHIP_CACHE_PUBLIC_KEY }}
      GHOSTSHIP_CACHE_GHCR_TOKEN: ${{ secrets.GHOSTSHIP_CACHE_GHCR_TOKEN }}
      GHOSTSHIP_CACHE_SIGNING_KEY: ${{ secrets.GHOSTSHIP_CACHE_SIGNING_KEY }}
      GHOSTSHIP_CACHE_GHCR_USER: ${{ github.repository_owner }}
      GITHUB_CACHE_FALLBACK_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CACHE_REFRESH_REQUESTED: ${{ github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_shared_cache == 'true') }}
    steps:
      - uses: actions/checkout@v6

      - uses: DeterminateSystems/nix-installer-action@main
        with:
          determinate: false
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Bootstrap shared Ghostship Nix cache
        id: cache_consume
        shell: bash
        run: |
          set -euo pipefail

          if scripts/shared_nix_cache.sh bootstrap; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "shared Ghostship cache not consumable before build; continuing with uncached build" >&2
          fi

      - name: Check shared cache publish configuration
        id: cache_publish
        shell: bash
        run: |
          set -euo pipefail

          if [ "${CACHE_REFRESH_REQUESTED:-false}" != "true" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "shared cache publication is gated off for this run; only the daily schedule or workflow_dispatch with publish_shared_cache=true can refresh the cache" >&2
          elif [ -z "${GHOSTSHIP_CACHE_PUBLIC_KEY:-}" ] || [ -z "${GHOSTSHIP_CACHE_SIGNING_KEY:-}" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "shared cache signing or public-key configuration missing; skipping cache publication" >&2
          elif scripts/shared_nix_cache.sh can-publish; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "shared cache publish token cannot open GHCR uploads for ${GHOSTSHIP_CACHE_REPO:-caelx/ghostship-cache}; skipping cache publication" >&2
          fi

      - name: Plan shared cache publication (pre-build)
        id: cache_plan
        if: steps.cache_publish.outputs.enabled == 'true'
        env:
          PLAN_FILE: ${{ runner.temp }}/ghostship-cache-${{ matrix.platform_tag }}.txt
        shell: bash
        run: |
          set -euo pipefail

          if timeout 900 scripts/shared_nix_cache.sh plan ".#packages.${{ matrix.system }}.ghostship-hermes-image" "$PLAN_FILE"; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            : > "$PLAN_FILE"
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "shared cache planning failed before image build; skipping cache upload for this leg" >&2
          fi
          echo "plan_file=$PLAN_FILE" >> "$GITHUB_OUTPUT"

      - name: Build and publish architecture archive
        id: build_image
        shell: bash
        run: |
          set -euo pipefail

          final_bundle="$(nix build --no-link --print-out-paths .#packages.${{ matrix.system }}.ghostship-hermes-image)"
          echo "final_bundle=$final_bundle" >> "$GITHUB_OUTPUT"

          scripts/export_publishable_image.sh \
            "$final_bundle" \
            "ghostship-hermes:ci-${PLATFORM_TAG}" \
            "ghostship-hermes-${PLATFORM_TAG}.tar"

      - name: Publish architecture image tags
        shell: bash
        run: |
          set -euo pipefail

          cat > publish-arch-tags.sh <<'SCRIPT'
          set -euo pipefail
          archive="docker-archive:$(pwd)/ghostship-hermes-${PLATFORM_TAG}.tar"
          for tag in $TAGS; do
            skopeo copy \
              "$archive" \
              "docker://${IMAGE_NAME}:${tag}-${PLATFORM_TAG}"
          done
          SCRIPT
          chmod +x publish-arch-tags.sh
          nix shell nixpkgs#skopeo -c bash ./publish-arch-tags.sh

      - name: Publish shared cache entries
        if: steps.cache_plan.outputs.enabled == 'true'
        env:
          PLAN_FILE: ${{ steps.cache_plan.outputs.plan_file }}
          FINAL_BUNDLE: ${{ steps.build_image.outputs.final_bundle }}
        shell: bash
        run: |
          set -euo pipefail

          if scripts/shared_nix_cache.sh publish "$PLAN_FILE" "$FINAL_BUNDLE"; then
            echo "shared cache publish completed" >&2
          else
            echo "shared cache publish failed after image build; keeping image publication result" >&2
          fi

      - name: Remove temporary publish artifacts
        if: always()
        run: rm -rf publish-arch-tags.sh "ghostship-hermes-${PLATFORM_TAG}.tar"

  publish-manifests:
    needs:
      - prepare
      - build-and-push
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ${{ needs.prepare.outputs.image_name }}
      TAGS: ${{ needs.prepare.outputs.tags }}
    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Publish manifest lists
        shell: bash
        run: |
          set -euo pipefail

          for tag in $TAGS; do
            docker buildx imagetools create \
              --tag "$IMAGE_NAME:$tag" \
              "$IMAGE_NAME:$tag-amd64" \
              "$IMAGE_NAME:$tag-arm64"
          done
