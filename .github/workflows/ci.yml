name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv cache
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            packages/searxng-cli/pyproject.toml
            packages/searxng-cli/uv.lock
            packages/ghostship-cli-contract/pyproject.toml
            scripts/python_utility.py
          cache-suffix: searxng-ci

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Enable GitHub Actions Nix cache fallback
        if: vars.CACHIX_CACHE_NAME == ''
        uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Enable Cachix substituter
        if: vars.CACHIX_CACHE_NAME != ''
        uses: cachix/cachix-action@v15
        with:
          name: ${{ vars.CACHIX_CACHE_NAME }}
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Validate flake evaluation
        # Keep this step at evaluation-only scope so it catches broken flake
        # wiring without redundantly building every check before the targeted
        # test/build steps below run.
        run: nix flake check --no-build

      - name: Run Python utility tests
        run: python3 scripts/python_utility.py test packages/searxng-cli

      - name: Build Python utility package
        run: python3 scripts/python_utility.py build packages/searxng-cli

      - name: Build runtime package
        run: nix build .#packages.x86_64-linux.ghostship-hermes-runtime

      - name: Evaluate arm64 image derivation
        # Keep x86-host CI at evaluation-only scope for arm64. Full arm64 image
        # builds run in publish-image on native arm64 infrastructure.
        run: nix eval .#packages.aarch64-linux.ghostship-hermes-image.drvPath --raw
