name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate flake evaluation
        run: nix flake check --no-build

      - name: Install uv
        run: python3 -m pip install --user uv

      - name: Run dashboard tests
        run: cd packages/hermes-dashboard && ~/.local/bin/uv run --extra dev python -m pytest tests -q -s

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build workstation image
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --target final \
            --cache-from type=registry,ref=ghcr.io/${{ github.repository_owner }}/ghostship-hermes:buildcache-amd64 \
            --build-arg HERMES_REF="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)" \
            --tag ghostship-hermes:ci \
            --file packages/hermes-image/Dockerfile \
            .

      - name: Smoke test workstation image
        run: tests/hermes-image/single-agent-dashboard.sh ghostship-hermes:ci
