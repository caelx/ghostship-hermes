name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Validate flake evaluation
        run: nix flake check --no-build

      - name: Run Python utility tests
        run: nix develop -c python3 scripts/python_utility.py test packages/searxng-cli

      - name: Build Python utility package
        run: nix develop -c python3 scripts/python_utility.py build packages/searxng-cli

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build workstation image
        run: |
          set -euo pipefail
          docker buildx build \
            --load \
            --build-arg HERMES_REF="$(tr -d '\n' < packages/hermes-image/hermes-release.txt)" \
            --tag ghostship-hermes:ci \
            --file packages/hermes-image/Dockerfile \
            .

      - name: Smoke test workstation image
        run: tests/hermes-image/single-agent-dashboard.sh ghostship-hermes:ci
